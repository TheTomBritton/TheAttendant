---
deployment:
  tasks:
    - export DEPLOYPATH=/home/tombrit1/demo.maidinthreads.tombritton.co.uk
    # Copy PW core
    - /bin/cp -R wire $DEPLOYPATH/wire
    # Copy vendor (Composer autoload + Stripe SDK)
    - /bin/cp -R vendor $DEPLOYPATH/vendor
    # Copy root files
    - /bin/cp index.php $DEPLOYPATH/index.php
    - /bin/cp .htaccess $DEPLOYPATH/.htaccess
    # Ensure site directory exists (config.php is managed manually on server)
    - /bin/mkdir -p $DEPLOYPATH/site
    # Copy templates
    - /bin/cp -R site/templates $DEPLOYPATH/site/templates
    # Copy built assets
    - /bin/mkdir -p $DEPLOYPATH/site/assets/dist
    - /bin/cp -R site/assets/dist $DEPLOYPATH/site/assets/
    # Copy modules
    - /bin/mkdir -p $DEPLOYPATH/site/modules
    - test -d site/modules && /bin/cp -R site/modules $DEPLOYPATH/site/ || true
    # Ensure PW runtime directories exist
    - /bin/mkdir -p $DEPLOYPATH/site/assets/files
    - /bin/mkdir -p $DEPLOYPATH/site/assets/cache
    - /bin/mkdir -p $DEPLOYPATH/site/assets/logs
    - /bin/mkdir -p $DEPLOYPATH/site/assets/sessions
    # Set permissions
    - find $DEPLOYPATH -type d -exec chmod 755 {} \;
    - find $DEPLOYPATH -type f -exec chmod 644 {} \;
    - chmod -R 755 $DEPLOYPATH/site/assets/
