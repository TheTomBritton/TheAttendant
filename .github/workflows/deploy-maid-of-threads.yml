name: Deploy Maid of Threads

on:
  # Auto-deploy when pushing to the maid-of-threads branch
  push:
    branches: [maid-of-threads]
    paths:
      - 'sites/maid-of-threads/**'
      - 'composer.json'
      - '.github/workflows/deploy-maid-of-threads.yml'

  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

# Only one deploy at a time — cancel in-progress runs
concurrency:
  group: deploy-maid-of-threads
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Push Deploy Branch
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── PHP + Composer ──────────────────────────────────────
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.json') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # ── Node + Build ────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: sites/maid-of-threads
        run: npm install

      - name: Build production assets
        working-directory: sites/maid-of-threads
        run: npm run build

      # ── Assemble deploy directory ───────────────────────────
      - name: Locate PW root files
        run: |
          PW_ROOT=vendor/processwire/processwire
          echo "=== PW package root files ==="
          ls -la $PW_ROOT/ | head -20
          echo ""
          echo "=== Looking for index.php ==="
          find vendor/processwire -name "index.php" -maxdepth 3 2>/dev/null || echo "not found"
          echo ""
          echo "=== Looking for htaccess ==="
          find vendor/processwire -name "*.htaccess*" -o -name "htaccess*" -maxdepth 3 2>/dev/null || echo "not found"

      - name: Assemble production files
        run: |
          PW_ROOT=vendor/processwire/processwire

          mkdir -p deploy/site/templates
          mkdir -p deploy/site/assets/dist
          mkdir -p deploy/site/modules

          # PW core (from Composer vendor dir)
          cp -R $PW_ROOT/wire deploy/wire

          # Vendor (Composer autoload + Stripe SDK)
          cp -R vendor deploy/vendor

          # Root PW files — check multiple locations
          for f in index.php; do
            if [ -f "$PW_ROOT/$f" ]; then
              cp "$PW_ROOT/$f" deploy/
            elif [ -f "$f" ]; then
              cp "$f" deploy/
            else
              echo "WARNING: $f not found — using project copy"
              cp "sites/maid-of-threads/deploy-files/$f" deploy/ 2>/dev/null || echo "MISSING: $f"
            fi
          done

          # .htaccess — use project copy (PW doesn't ship one in Composer package)
          cp sites/maid-of-threads/deploy-files/.htaccess deploy/ 2>/dev/null || \
            cp "$PW_ROOT/htaccess.txt" deploy/.htaccess 2>/dev/null || \
            echo "WARNING: No .htaccess found — will create one"

          # Site config
          cp sites/maid-of-threads/config.php deploy/site/config.php

          # Templates
          cp -R sites/maid-of-threads/templates/* deploy/site/templates/

          # Built assets
          cp -R sites/maid-of-threads/assets/dist/* deploy/site/assets/dist/

          # Modules (if any)
          if [ -d "sites/maid-of-threads/modules" ] && [ "$(ls -A sites/maid-of-threads/modules)" ]; then
            cp -R sites/maid-of-threads/modules/* deploy/site/modules/
          fi

          # .cpanel.yml goes in the repo root
          cp .cpanel.yml deploy/.cpanel.yml

          echo "Deploy package assembled:"
          du -sh deploy/

      # ── Push to deploy branch ───────────────────────────────
      - name: Push to deploy branch
        run: |
          cd deploy

          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git checkout -b deploy/maid-of-threads
          git add -A
          git commit -m "Deploy $(date -u '+%Y-%m-%d %H:%M:%S UTC') from ${GITHUB_SHA::8}"

          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push --force origin deploy/maid-of-threads
